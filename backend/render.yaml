services:
  - type: web
    name: westernpumps-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DISABLE_AUTH
        value: "false"
      - key: SECRET_KEY
        sync: false
