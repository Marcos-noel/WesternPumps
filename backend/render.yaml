services:
  - type: web
    name: WesternPumps
    rootDir: backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:////tmp/westernpumps.db
      - key: JWT_SECRET
        value: replace-with-a-long-random-secret
      - key: CORS_ORIGINS
        value: "https://western-pumps-np2i.vercel.app,https://westernpumps-vk0u.onrender.com"
      - key: DISABLE_AUTH
        value: "false"
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: ENFORCE_HTTPS
        value: "true"
