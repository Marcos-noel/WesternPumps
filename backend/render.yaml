services:
  - type: web
    name: WesternPumps
    rootDir: backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: DISABLE_AUTH
        value: "false"
      - key: ENABLE_AUTH_BOOTSTRAP
        value: "true"
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_FULL_NAME
        sync: false
      - key: ENFORCE_HTTPS
        value: "true"
